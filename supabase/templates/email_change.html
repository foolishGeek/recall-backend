<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Confirm your new email for Recall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap');
</style>
</head>
<body style="margin:0;padding:0;background-color:#F7F6F3;font-family:'Inter',Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F7F6F3;">
  <tr>
    <td align="center" style="padding:48px 16px 32px;">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;">
        <!-- Logo + Wordmark -->
        <tr>
          <td align="center" style="padding-bottom:40px;">
            <img src="https://vxbqzzebiuxzywmekdex.supabase.co/storage/v1/object/public/brand-assets/recall-mark-120.png"
                 alt="Recall" width="60" height="60"
                 style="display:block;border:0;outline:none;width:60px;height:60px;">
            <p style="margin:16px 0 0;font-family:'Nunito',Arial,Helvetica,sans-serif;font-weight:700;font-size:32px;color:#111111;letter-spacing:0.3px;">
              Recall
            </p>
          </td>
        </tr>
        <!-- Card -->
        <tr>
          <td style="background-color:#FFFFFF;border-radius:16px;border:1px solid #E7E5E1;padding:40px 36px;">
            <h1 style="margin:0 0 12px;font-family:'Inter',Arial,Helvetica,sans-serif;font-weight:600;font-size:22px;line-height:1.3;color:#111111;">
              Confirm email change
            </h1>
            <p style="margin:0 0 28px;font-family:'Inter',Arial,Helvetica,sans-serif;font-weight:400;font-size:15px;line-height:1.6;color:#5C5A55;">
              Tap the button below to confirm changing your email address.
            </p>
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
              <tr>
                <td align="center" style="background-color:#111111;border-radius:12px;">
                  <a href="{{ .ConfirmationURL }}"
                     target="_blank"
                     style="display:inline-block;padding:14px 32px;font-family:'Inter',Arial,Helvetica,sans-serif;font-weight:600;font-size:15px;color:#F7F6F3;text-decoration:none;border-radius:12px;">
                    Confirm change
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:24px 0 0;font-family:'Inter',Arial,Helvetica,sans-serif;font-weight:400;font-size:13px;line-height:1.5;color:#8A8780;">
              If you didn't request this change, please secure your account immediately.
            </p>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td align="center" style="padding:28px 16px 0;">
            <p style="margin:0;font-family:'JetBrains Mono','Courier New',monospace;font-weight:500;font-size:10px;line-height:1.5;color:#8A8780;text-transform:uppercase;letter-spacing:0.3px;">
              <a href="https://ripplelabs.in/recall/tos" style="color:#8A8780;text-decoration:none;">Terms</a>
              &nbsp;&middot;&nbsp;
              <a href="https://ripplelabs.in/recall/privacy" style="color:#8A8780;text-decoration:none;">Privacy</a>
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
